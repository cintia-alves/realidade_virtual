
<head> 
    <title>Primeira experiência de RA usando o AR.js e o A-frame. Marcador Hiro e uma imagem.</title>
     <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
     <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-assets>
        <a-asset-item id="modelo" src="star.gltf"></a-asset-item>
      </a-assets>
      <a-marker preset="hiro">
        <a-entity id="modelo3d"           
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
          gltf-model="#modelo"> </a-entity>
      </a-marker>	
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
